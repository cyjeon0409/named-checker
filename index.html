<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네임드 기업 판정기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    header {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 20px 0;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 13px; color: var(--gray-600); margin-top: 3px; }
    header .warning { font-size: 11px; color: #dc2626; font-weight: 600; margin-top: 5px; }

    .search-section {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 20px 0;
    }

    .search-box { display: flex; gap: 8px; }

    .search-box input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .search-box input:focus { border-color: var(--primary); }
    .search-box input:disabled { background: var(--gray-100); }

    .search-box button {
      padding: 11px 22px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .search-box button:hover:not(:disabled) { background: var(--primary-dark); }
    .search-box button:disabled { background: var(--gray-400); cursor: not-allowed; }

    .main-content { padding: 24px 0 60px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 72px 20px;
      color: var(--gray-400);
    }
    .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
    .empty-state h2 { font-size: 17px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; line-height: 1.7; }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state p { font-size: 14px; color: var(--gray-600); }
    .loading-state small { font-size: 12px; color: var(--gray-400); display: block; margin-top: 4px; }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 10px;
    }

    /* Criteria cards */
    .criteria-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .criteria-card {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .criteria-card.pass { border-color: var(--success); background: #f0fdf4; }
    .criteria-card.fail { border-color: var(--danger); background: #fef2f2; }
    .criteria-card.unknown { border-color: var(--gray-200); background: white; }

    .criteria-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      background: var(--gray-100);
      margin-top: 1px;
    }

    .criteria-body { flex: 1; min-width: 0; }

    .criteria-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    .criteria-label {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge-required {
      font-size: 10px;
      font-weight: 700;
      background: #fefce8;
      color: #854d0e;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .criteria-status {
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .criteria-status.pass { color: var(--success); }
    .criteria-status.fail { color: var(--danger); }
    .criteria-status.unknown { color: var(--gray-400); }

    .criteria-detail {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 4px;
      line-height: 1.5;
    }

    .criteria-source {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--primary);
      text-decoration: none;
      margin-top: 4px;
    }

    .criteria-source:hover { text-decoration: underline; }

    /* OR divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0;
      padding: 0 6px;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .or-divider span { font-size: 11px; font-weight: 700; color: var(--gray-400); }

    /* Verdict */
    .verdict-card {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 20px 22px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .verdict-card.named { border-color: var(--success); background: #f0fdf4; }
    .verdict-card.not-named { border-color: var(--danger); background: #fef2f2; }

    .verdict-emoji { font-size: 34px; flex-shrink: 0; }

    .verdict-title { font-size: 18px; font-weight: 800; }
    .verdict-title.named { color: var(--success); }
    .verdict-title.not-named { color: var(--danger); }

    .verdict-reason { font-size: 13px; color: var(--gray-600); margin-top: 4px; line-height: 1.5; }

    /* News */
    .news-section {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    .news-header {
      padding: 13px 18px;
      border-bottom: 1px solid var(--gray-100);
    }

    .news-header h3 { font-size: 13px; font-weight: 700; }

    .news-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }

    .news-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--gray-50);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .news-item:hover { background: var(--gray-100); }

    .news-source {
      font-size: 10px;
      font-weight: 700;
      background: var(--gray-200);
      color: var(--gray-600);
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      min-width: 48px;
      text-align: center;
    }

    .news-title { font-size: 13px; color: var(--gray-800); flex: 1; line-height: 1.4; }
    .news-arrow { font-size: 11px; color: var(--gray-400); flex-shrink: 0; }

    /* Error */
    .error-state {
      background: #fef2f2;
      border: 1.5px solid var(--danger);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: var(--danger);
    }

    .error-state p { font-size: 14px; font-weight: 600; }
    .error-state small { font-size: 12px; color: var(--gray-600); display: block; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>네임드 기업 판정기</h1>
    <p>KDT 고성과 과정 참여기업 네임드 여부 자동 판정</p>
    <p class="warning">⚠️ 검색 결과 오류 가능성 보유, 자체 판단 필수!</p>
  </div>
</header>

<div class="search-section">
  <div class="container">
    <div class="search-box">
      <input type="text" id="companyInput" placeholder="기업명 입력 (예: 쿡앱스, 달바글로벌, 뤼튼)" />
      <button id="searchBtn" onclick="search()">
        <span id="btnText">판정하기</span>
      </button>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="container">

    <div id="emptyState" class="empty-state">
      <div class="icon">🏢</div>
      <h2>기업명을 입력해주세요</h2>
      <p>임직원 수 · 투자금 · 매출액을 자동으로 조사해<br/>네임드 여부와 근거를 알려드립니다</p>
    </div>

    <div id="loadingState" class="loading-state" style="display:none;">
      <div class="spinner"></div>
      <p>기업 정보를 조사하고 있어요</p>
      <small>투자 이력, 재무 정보, 뉴스를 검색 중...</small>
    </div>

    <div id="errorState" class="error-state" style="display:none;">
      <p>조회 실패</p>
      <small id="errorMsg"></small>
    </div>

    <div id="resultSection" style="display:none;"></div>

  </div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

  async function search() {
    const name = document.getElementById('companyInput').value.trim();
    if (!name) return;

    setLoading(true);
    hide('emptyState');
    hide('errorState');
    hide('resultSection');

    try {
      const res = await fetch(`${API_BASE}/api/check?company=${encodeURIComponent(name)}`);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '서버 오류');
      }
      const data = await res.json();
      renderResult(data);
    } catch (e) {
      show('errorState');
      document.getElementById('errorMsg').textContent = e.message;
    } finally {
      setLoading(false);
    }
  }

  function renderResult(d) {
    const el = document.getElementById('resultSection');

    const empPass  = d.employee?.pass;
    const invPass  = d.investment?.pass;
    const revPass  = d.revenue?.pass;
    const conPass  = d.conglomerate?.pass;

    el.innerHTML = `
      <div class="section-label">판정 기준 — 아래 중 1개 이상 충족</div>
      <div class="criteria-grid">
        ${criteriaCard('👥', '임직원 100명 이상', false, empPass,
            d.employee?.text || '확인 불가',
            d.employee?.source, d.employee?.source_url)}
        <div class="or-divider"><span>OR</span></div>
        ${criteriaCard('💰', '누적 투자금 50억 이상', false, invPass,
            d.investment?.text || '확인 불가',
            d.investment?.source, d.investment?.source_url)}
        <div class="or-divider"><span>OR</span></div>
        ${criteriaCard('📊', '연매출 100억 이상', false, revPass,
            d.revenue?.text || '확인 불가',
            d.revenue?.source, d.revenue?.source_url)}
        <div class="or-divider"><span>OR</span></div>
        ${criteriaCard('🏛️', '대기업집단 계열사', false, conPass,
            d.conglomerate?.is_member
              ? `공정위 지정 계열사 (${d.conglomerate?.parent || ''})`
              : '해당 없음',
            null, null)}
      </div>

      <div class="verdict-card ${d.verdict === 'named' ? 'named' : 'not-named'}">
        <div class="verdict-emoji">${d.verdict === 'named' ? '✅' : '❌'}</div>
        <div>
          <div class="verdict-title ${d.verdict === 'named' ? 'named' : 'not-named'}">
            ${d.verdict === 'named' ? '네임드 기업' : '네임드 아님'}
          </div>
          <div class="verdict-reason">${d.reason || ''}</div>
        </div>
      </div>

      <div class="news-section" style="margin-top:20px;">
        <div class="news-header" style="display:flex;align-items:center;gap:10px;">
          <h3>채용 공고</h3>
          <span style="font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;${d.hiring?.is_hiring ? 'background:#dcfce7;color:#16a34a;' : 'background:#f3f4f6;color:#9ca3af;'}">
            ${d.hiring?.is_hiring ? '● 채용 중' : '● 공고 없음'}
          </span>
        </div>
        ${d.hiring?.jobs?.length ? `
          <div class="news-list">
            ${d.hiring.jobs.map(j => `
              <a href="${j.url || '#'}" target="_blank" class="news-item">
                <span class="news-source">채용</span>
                <span class="news-title">${j.title}</span>
                <span class="news-arrow">→</span>
              </a>
            `).join('')}
          </div>
        ` : '<div style="padding:14px 20px;font-size:13px;color:#9ca3af;">현재 검색된 채용 공고가 없습니다</div>'}
      </div>

      ${d.news?.length ? `
        <div class="news-section">
          <div class="news-header"><h3>관련 뉴스 기사</h3></div>
          <div class="news-list">
            ${d.news.map(n => `
              <a href="${n.url || '#'}" target="_blank" class="news-item">
                <span class="news-source">${n.source || '뉴스'}</span>
                <span class="news-title">${n.title}</span>
                <span class="news-arrow">→</span>
              </a>
            `).join('')}
          </div>
        </div>
      ` : ''}
    `;

    show('resultSection');
  }

  function criteriaCard(icon, label, required, pass, detail, source, sourceUrl) {
    const statusClass = pass === true ? 'pass' : pass === false ? 'fail' : 'unknown';
    const statusText  = pass === true ? '✓ 충족' : pass === false ? '✗ 미충족' : '— 확인불가';
    return `
      <div class="criteria-card ${statusClass}">
        <div class="criteria-icon">${icon}</div>
        <div class="criteria-body">
          <div class="criteria-header">
            <div class="criteria-label">
              ${label}
              ${required ? '<span class="badge-required">필수</span>' : ''}
            </div>
            <span class="criteria-status ${statusClass}">${statusText}</span>
          </div>
          <div class="criteria-detail">${detail}</div>
          ${source && sourceUrl ? `<a href="${sourceUrl}" target="_blank" class="criteria-source">출처: ${source} →</a>` : ''}
        </div>
      </div>
    `;
  }

  function setLoading(on) {
    document.getElementById('loadingState').style.display = on ? 'block' : 'none';
    document.getElementById('companyInput').disabled = on;
    const btn = document.getElementById('searchBtn');
    btn.disabled = on;
    document.getElementById('btnText').textContent = on ? '조사 중...' : '판정하기';
  }

  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }

  document.getElementById('companyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>

</body>
</html>
